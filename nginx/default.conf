server {
    listen 80;
    server_name _;

    if ($host = www.thomashayford.site) {
        return 301 https://thomashayford.site$request_uri;
    }

    # Legacy taxonomy redirect.
    rewrite ^/journal/professional/?$ /journal/business/ permanent;
    rewrite ^/journal/professional/(.*)$ /journal/business/$1 permanent;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    location / {
        try_files $uri $uri/ =404;
        # Always revalidate HTML routes so page content updates immediately.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Internal scaffolding should not be publicly indexed or visited.
    location ^~ /journal/templates/ {
        return 404;
    }

    location ~* \.(css|js|svg|ico|xml|txt|webmanifest)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    }
}
