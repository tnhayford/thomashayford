services:
  thomashayford-web:
    image: nginx:alpine
    container_name: thomashayford-web
    restart: unless-stopped

    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - proxy

    labels:
      - "traefik.enable=true"

      # HTTP router for ACME + plain HTTP
      - "traefik.http.routers.thomashayford-http.rule=Host(`thomashayford.site`) || Host(`www.thomashayford.site`)"
      - "traefik.http.routers.thomashayford-http.entrypoints=web"
      - "traefik.http.routers.thomashayford-http.middlewares=thomashayford-https-redirect"
      - "traefik.http.middlewares.thomashayford-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.thomashayford-https-redirect.redirectscheme.permanent=true"

      # HTTPS router
      - "traefik.http.routers.thomashayford.rule=Host(`thomashayford.site`) || Host(`www.thomashayford.site`)"
      - "traefik.http.routers.thomashayford.entrypoints=websecure"
      - "traefik.http.routers.thomashayford.tls=true"
      - "traefik.http.routers.thomashayford.tls.certresolver=letsencrypt"

      # Service
      - "traefik.http.services.thomashayford.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
